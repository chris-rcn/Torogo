<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torogo — Toroidal Go</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #e0d8c8;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  h1 {
    font-size: 1.8rem;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
    color: #f0e6c8;
  }

  .subtitle {
    font-size: 0.78rem;
    color: #a09888;
    letter-spacing: 0.18em;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  #board-canvas {
    display: block;
    cursor: grab;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    touch-action: none;
  }

  #board-canvas.placing {
    cursor: crosshair;
  }

  #board-canvas.panning {
    cursor: grabbing;
  }

  .info-panel {
    display: flex;
    gap: 24px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .player-info {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 8px;
    background: #12122a;
    border: 2px solid transparent;
    transition: border-color 0.2s;
    min-width: 130px;
    justify-content: center;
  }

  .player-info.active {
    border-color: #c8a84a;
  }

  .stone-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .stone-dot.black {
    background: radial-gradient(circle at 35% 35%, #555, #111);
    box-shadow: 1px 1px 3px rgba(0,0,0,0.8);
  }

  .stone-dot.white {
    background: radial-gradient(circle at 35% 35%, #fff, #ccc);
    box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  }

  .player-label {
    font-size: 0.85rem;
    color: #c8c0b0;
  }

  .capture-count {
    font-size: 0.78rem;
    color: #a09080;
  }

  #status-msg {
    margin-top: 10px;
    font-size: 0.88rem;
    color: #c8a84a;
    letter-spacing: 0.05em;
    min-height: 1.2em;
    text-align: center;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    padding: 8px 20px;
    border-radius: 6px;
    border: 1px solid #4a4060;
    background: #2a2a4a;
    color: #e0d8c8;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s, border-color 0.15s;
  }

  button:hover {
    background: #3a3a5a;
    border-color: #6a60a0;
  }

  button:active {
    background: #1e1e3a;
  }

  button#pass-btn {
    background: #2a3a2a;
    border-color: #4a604a;
  }

  button#pass-btn:hover {
    background: #3a4a3a;
    border-color: #6a906a;
  }

  select {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #4a4060;
    background: #2a2a4a;
    color: #e0d8c8;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
  }

  #score-panel {
    display: none;
    margin-top: 14px;
    padding: 14px 24px;
    background: #12122a;
    border-radius: 10px;
    border: 1px solid #4a4060;
    text-align: center;
    min-width: 240px;
  }

  #score-panel h2 {
    font-size: 1.1rem;
    color: #c8a84a;
    margin-bottom: 8px;
  }

  #score-panel table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  #score-panel td {
    padding: 3px 10px;
    color: #c0b8a8;
  }

  #score-panel td:first-child {
    text-align: left;
    color: #a09888;
  }

  #score-panel td:last-child {
    text-align: right;
    font-weight: bold;
  }

  #winner-text {
    margin-top: 10px;
    font-size: 1.1rem;
    color: #f0e060;
    font-weight: bold;
  }
</style>
</head>
<body>
<h1>Torogo</h1>
<p class="subtitle">Toroidal Go</p>

<canvas id="board-canvas"></canvas>

<div class="info-panel">
  <div class="player-info" id="black-info">
    <div class="stone-dot black"></div>
    <div>
      <div class="player-label">Black</div>
      <div class="capture-count" id="black-captures">Captured: 0</div>
    </div>
  </div>
  <div class="player-info" id="white-info">
    <div class="stone-dot white"></div>
    <div>
      <div class="player-label">White</div>
      <div class="capture-count" id="white-captures">Captured: 0</div>
    </div>
  </div>
</div>

<div id="status-msg">Black to play</div>

<div class="controls">
  <button id="pass-btn">Pass</button>
  <button id="new-game-btn">New Game</button>
  <select id="size-select">
    <option value="9">9 × 9</option>
    <option value="13">13 × 13</option>
    <option value="19">19 × 19</option>
  </select>
</div>

<div id="score-panel">
  <h2>Final Score</h2>
  <table id="score-table"></table>
  <div id="winner-text"></div>
</div>

<script>
// How many extra intersections to render beyond each tile edge.
// 0 = exact tile boundaries; increase to show wrapping rows/cols and make
// the toroidal topology more intuitive.
const OVERLAP = 1;

// ─── Board ────────────────────────────────────────────────────────────────────

class Board {
  constructor(size) {
    this.size = size;
    this.grid = Array.from({ length: size }, () => Array(size).fill(null));
  }

  clone() {
    const b = new Board(this.size);
    b.grid = this.grid.map(row => row.slice());
    return b;
  }

  get(x, y) {
    return this.grid[y][x];
  }

  set(x, y, color) {
    this.grid[y][x] = color;
  }

  // Toroidal wrapping: 4 neighbors with modular arithmetic
  getNeighbors(x, y) {
    const N = this.size;
    return [
      [(x + 1) % N, y],
      [(x - 1 + N) % N, y],
      [x, (y + 1) % N],
      [x, (y - 1 + N) % N],
    ];
  }

  // BFS flood-fill: returns array of [x,y] for connected same-color stones
  getGroup(x, y) {
    const color = this.get(x, y);
    if (!color) return [];
    const visited = new Set();
    const queue = [[x, y]];
    const group = [];
    visited.add(`${x},${y}`);
    while (queue.length) {
      const [cx, cy] = queue.shift();
      group.push([cx, cy]);
      for (const [nx, ny] of this.getNeighbors(cx, cy)) {
        const key = `${nx},${ny}`;
        if (!visited.has(key) && this.get(nx, ny) === color) {
          visited.add(key);
          queue.push([nx, ny]);
        }
      }
    }
    return group;
  }

  // Count unique empty intersections adjacent to the group
  getLiberties(group) {
    const liberties = new Set();
    for (const [x, y] of group) {
      for (const [nx, ny] of this.getNeighbors(x, y)) {
        if (this.get(nx, ny) === null) {
          liberties.add(`${nx},${ny}`);
        }
      }
    }
    return liberties;
  }

  // Check if a group has zero liberties
  hasNoLiberties(group) {
    return this.getLiberties(group).size === 0;
  }

  // After placing at (lastX, lastY), capture groups with 0 liberties.
  // Returns count of captured stones per color: { black: N, white: N }
  captureGroups(lastX, lastY) {
    const placedColor = this.get(lastX, lastY);
    const opponentColor = placedColor === 'black' ? 'white' : 'black';
    const captured = { black: 0, white: 0 };

    // Check opponent groups adjacent to the placed stone
    const checked = new Set();
    for (const [nx, ny] of this.getNeighbors(lastX, lastY)) {
      const key = `${nx},${ny}`;
      if (!checked.has(key) && this.get(nx, ny) === opponentColor) {
        const group = this.getGroup(nx, ny);
        group.forEach(([gx, gy]) => checked.add(`${gx},${gy}`));
        if (this.hasNoLiberties(group)) {
          for (const [gx, gy] of group) {
            this.set(gx, gy, null);
            captured[opponentColor]++;
          }
        }
      }
    }

    // Check own group for suicide
    const ownGroup = this.getGroup(lastX, lastY);
    if (this.hasNoLiberties(ownGroup)) {
      for (const [gx, gy] of ownGroup) {
        this.set(gx, gy, null);
        captured[placedColor]++;
      }
    }

    return captured;
  }
}

// ─── Game ─────────────────────────────────────────────────────────────────────

class Game {
  constructor(boardSize = 9) {
    this.boardSize = boardSize;
    this.board = new Board(boardSize);
    this.current = 'black';
    this.captured = { black: 0, white: 0 }; // stones captured of each color
    this.prevHash = null;     // board hash before the most recent move (for Ko)
    this.consecutivePasses = 0;
    this.gameOver = false;
    this.lastMove = null;
    this.scores = null;       // set on game end
    this.illegalFlash = null; // {x, y} of last rejected move, for visual feedback
  }

  boardHash() {
    return this.board.grid.map(row => row.map(c => c ? c[0] : '.').join('')).join('|');
  }

  // Returns true if move was legal and placed
  placeStone(x, y) {
    if (this.gameOver) return false;
    if (this.board.get(x, y) !== null) {
      this.illegalFlash = { x, y };
      return false;
    }

    const hashBefore = this.boardHash();

    // Clone board for potential rollback
    const savedGrid = this.board.grid.map(row => row.slice());

    this.board.set(x, y, this.current);
    const newCaptured = this.board.captureGroups(x, y);

    // Suicide: if our stone was removed, it's illegal
    if (this.board.get(x, y) === null) {
      this.board.grid = savedGrid;
      this.illegalFlash = { x, y };
      return false;
    }

    const hashAfter = this.boardHash();

    // Ko rule: reject if this recreates the board state before previous move
    if (hashAfter === this.prevHash) {
      this.board.grid = savedGrid;
      this.illegalFlash = { x, y };
      return false;
    }

    // Move is legal — commit
    this.illegalFlash = null;
    this.captured.black += newCaptured.black;
    this.captured.white += newCaptured.white;
    this.prevHash = hashBefore;
    this.lastMove = { x, y };
    this.consecutivePasses = 0;
    this.current = this.current === 'black' ? 'white' : 'black';
    return true;
  }

  pass() {
    if (this.gameOver) return;
    this.consecutivePasses++;
    this.lastMove = null;
    this.illegalFlash = null;
    const passer = this.current;
    this.current = this.current === 'black' ? 'white' : 'black';
    if (this.consecutivePasses >= 2) {
      this.endGame();
    }
    return passer;
  }

  endGame() {
    this.gameOver = true;
    const territory = this.calcTerritory();
    this.scores = {
      black: { territory: territory.black, captures: this.captured.white },
      white: { territory: territory.white, captures: this.captured.black },
    };
    this.scores.black.total = this.scores.black.territory + this.scores.black.captures;
    this.scores.white.total = this.scores.white.territory + this.scores.white.captures;
  }

  // BFS over empty cells; attribute to a color if all reachable boundary
  // stones are of one color (toroidal wrapping respected).
  calcTerritory() {
    const N = this.board.size;
    const visited = new Set();
    const territory = { black: 0, white: 0, neutral: 0 };

    for (let y = 0; y < N; y++) {
      for (let x = 0; x < N; x++) {
        const key = `${x},${y}`;
        if (this.board.get(x, y) !== null || visited.has(key)) continue;

        // BFS to find the empty region and its border colors
        const region = [];
        const borderColors = new Set();
        const queue = [[x, y]];
        visited.add(key);

        while (queue.length) {
          const [cx, cy] = queue.shift();
          region.push([cx, cy]);
          for (const [nx, ny] of this.board.getNeighbors(cx, cy)) {
            const nkey = `${nx},${ny}`;
            const cell = this.board.get(nx, ny);
            if (cell !== null) {
              borderColors.add(cell);
            } else if (!visited.has(nkey)) {
              visited.add(nkey);
              queue.push([nx, ny]);
            }
          }
        }

        if (borderColors.size === 1) {
          const [owner] = borderColors;
          territory[owner] += region.length;
        } else {
          territory.neutral += region.length;
        }
      }
    }

    return territory;
  }

  statusText() {
    if (this.gameOver) return 'Game over';
    const name = this.current === 'black' ? 'Black' : 'White';
    return `${name} to play`;
  }
}

// ─── Renderer ─────────────────────────────────────────────────────────────────

class Renderer {
  constructor(canvas, game) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.game = game;
    this.padding = 32;
    this.panX = 0;
    this.panY = 0;
    this.hoverPos = null;
    this.resize();
  }

  resize() {
    const N = this.game.boardSize;
    const maxSize = Math.min(window.innerWidth - 32, window.innerHeight - 220, 640);
    const size = Math.max(maxSize, 280);
    this.canvas.width = size;
    this.canvas.height = size;
    // Fit N-1+OVERLAP spacings so OVERLAP extra intersections are visible in total
    this.cellSize = (size - this.padding * 2) / (N - 1 + OVERLAP);
    // Split OVERLAP as evenly as possible: floor(OVERLAP/2) on left/top,
    // ceil(OVERLAP/2) on right/bottom
    const panOffset = Math.floor(OVERLAP / 2) * this.cellSize;
    this.panX = panOffset;
    this.panY = panOffset;
  }

  // Convert grid coords to canvas pixels, accounting for pan and tile offset
  toCanvas(x, y, offX = 0, offY = 0) {
    return [
      this.padding + this.panX + offX + x * this.cellSize,
      this.padding + this.panY + offY + y * this.cellSize,
    ];
  }

  // Convert canvas pixel to nearest grid intersection, with toroidal wrapping
  fromCanvas(px, py) {
    const N = this.game.boardSize;
    const rx = px - this.padding - this.panX;
    const ry = py - this.padding - this.panY;
    const x = ((Math.round(rx / this.cellSize) % N) + N) % N;
    const y = ((Math.round(ry / this.cellSize) % N) + N) % N;
    return { x, y };
  }

  // Tile size: the pixel distance between equivalent points on adjacent copies
  tileSize() {
    return this.game.boardSize * this.cellSize;
  }

  draw() {
    const ctx = this.ctx;
    const W = this.canvas.width;
    const H = this.canvas.height;
    const N = this.game.boardSize;
    const ts = this.tileSize();

    // Board background
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#d4a84a');
    grad.addColorStop(1, '#c49840');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Compute which tile indices are needed to cover the canvas viewport,
    // so panning works infinitely in any direction.
    const dxMin = Math.floor((-this.panX - this.padding) / ts);
    const dxMax = Math.ceil((W - this.panX - this.padding) / ts);
    const dyMin = Math.floor((-this.panY - this.padding) / ts);
    const dyMax = Math.ceil((H - this.panY - this.padding) / ts);

    for (let dy = dyMin; dy <= dyMax; dy++) {
      for (let dx = dxMin; dx <= dxMax; dx++) {
        const offX = dx * ts;
        const offY = dy * ts;
        this.drawGrid(offX, offY);
        this.drawStones(offX, offY);
        this.drawLastMove(offX, offY);
        this.drawIllegalFlash(offX, offY);
      }
    }

    // Ghost stone is drawn in its own pass so each canvas position is
    // painted exactly once (the per-tile OVERLAP regions would otherwise
    // overlap and compound the alpha).
    this.drawGhostStone();
  }

  drawGrid(offX = 0, offY = 0) {
    const ctx = this.ctx;
    const N = this.game.boardSize;
    const cs = this.cellSize;
    ctx.strokeStyle = '#5a3a10';
    ctx.lineWidth = 1;

    const lo = -OVERLAP;
    const hi = N - 1 + OVERLAP;

    const [, topY] = this.toCanvas(0,  lo, offX, offY);
    const [, botY] = this.toCanvas(0,  hi, offX, offY);
    const [leftX]  = this.toCanvas(lo, 0,  offX, offY);
    const [rightX] = this.toCanvas(hi, 0,  offX, offY);

    for (let i = lo; i <= hi; i++) {
      const [cx] = this.toCanvas(i, 0, offX, offY);
      ctx.beginPath();
      ctx.moveTo(cx, topY);
      ctx.lineTo(cx, botY + cs); // +cs bridges gap to adjacent tile when OVERLAP=0
      ctx.stroke();

      const [, cy] = this.toCanvas(0, i, offX, offY);
      ctx.beginPath();
      ctx.moveTo(leftX, cy);
      ctx.lineTo(rightX + cs, cy);
      ctx.stroke();
    }
  }

  drawIllegalFlash(offX = 0, offY = 0) {
    const flash = this.game.illegalFlash;
    if (!flash) return;
    const N = this.game.boardSize;
    const r = this.cellSize * 0.38;
    this.ctx.save();
    this.ctx.globalAlpha = 0.35;
    this.ctx.fillStyle = '#ff4444';
    for (let gy = -OVERLAP; gy < N + OVERLAP; gy++) {
      for (let gx = -OVERLAP; gx < N + OVERLAP; gx++) {
        if (((gx % N) + N) % N !== flash.x || ((gy % N) + N) % N !== flash.y) continue;
        const [cx, cy] = this.toCanvas(gx, gy, offX, offY);
        this.ctx.beginPath();
        this.ctx.arc(cx, cy, r, 0, Math.PI * 2);
        this.ctx.fill();
      }
    }
    this.ctx.restore();
  }

  drawStones(offX = 0, offY = 0) {
    const ctx = this.ctx;
    const N = this.game.boardSize;
    const r = this.cellSize * 0.46;

    for (let gy = -OVERLAP; gy < N + OVERLAP; gy++) {
      for (let gx = -OVERLAP; gx < N + OVERLAP; gx++) {
        // Wrap visual index to logical grid coordinate
        const bx = ((gx % N) + N) % N;
        const by = ((gy % N) + N) % N;
        const color = this.game.board.get(bx, by);
        if (!color) continue;

        const [cx, cy] = this.toCanvas(gx, gy, offX, offY);

        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;

        const grad = ctx.createRadialGradient(
          cx - r * 0.3, cy - r * 0.3, r * 0.05,
          cx, cy, r
        );
        if (color === 'black') {
          grad.addColorStop(0, '#666');
          grad.addColorStop(1, '#111');
        } else {
          grad.addColorStop(0, '#fff');
          grad.addColorStop(1, '#bbb');
        }
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.strokeStyle = color === 'black' ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.18)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  drawGhostStone() {
    const h = this.hoverPos;
    if (!h || this.game.gameOver) return;
    if (this.game.board.get(h.x, h.y) !== null) return;
    const cs = this.cellSize;
    const ts = this.tileSize();
    const W = this.canvas.width;
    const H = this.canvas.height;
    const r = cs * 0.46;
    const color = this.game.current;
    const ctx = this.ctx;

    // Canvas position of this cell in the base tile
    const baseX = this.padding + this.panX + h.x * cs;
    const baseY = this.padding + this.panY + h.y * cs;

    // Range of tile repetitions whose instance of this cell is on-screen,
    // including OVERLAP margin so edge duplicates are covered.
    const kMin = Math.floor((-baseX - OVERLAP * cs) / ts);
    const kMax = Math.ceil((W - baseX + OVERLAP * cs) / ts);
    const mMin = Math.floor((-baseY - OVERLAP * cs) / ts);
    const mMax = Math.ceil((H - baseY + OVERLAP * cs) / ts);

    ctx.save();
    ctx.globalAlpha = 0.4;
    for (let m = mMin; m <= mMax; m++) {
      for (let k = kMin; k <= kMax; k++) {
        const cx = baseX + k * ts;
        const cy = baseY + m * ts;
        if (cx < -r || cx > W + r || cy < -r || cy > H + r) continue;
        const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.05, cx, cy, r);
        if (color === 'black') {
          grad.addColorStop(0, '#666');
          grad.addColorStop(1, '#111');
        } else {
          grad.addColorStop(0, '#fff');
          grad.addColorStop(1, '#bbb');
        }
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

  drawLastMove(offX = 0, offY = 0) {
    const lm = this.game.lastMove;
    if (!lm) return;
    const N = this.game.boardSize;
    const prev = this.game.current === 'black' ? 'white' : 'black';
    this.ctx.fillStyle = prev === 'black' ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.7)';
    const r = this.cellSize * 0.14;
    // Draw marker at every visual position that maps to the last-move cell
    for (let gy = -OVERLAP; gy < N + OVERLAP; gy++) {
      for (let gx = -OVERLAP; gx < N + OVERLAP; gx++) {
        if (((gx % N) + N) % N !== lm.x || ((gy % N) + N) % N !== lm.y) continue;
        const [cx, cy] = this.toCanvas(gx, gy, offX, offY);
        this.ctx.beginPath();
        this.ctx.arc(cx, cy, r, 0, Math.PI * 2);
        this.ctx.fill();
      }
    }
  }
}

// ─── App wiring ───────────────────────────────────────────────────────────────

let game;
let renderer;
const canvas = document.getElementById('board-canvas');

function updateUI() {
  const g = game;
  document.getElementById('status-msg').textContent = g.statusText();

  // Captured counts: black captures = white stones captured by black
  document.getElementById('black-captures').textContent =
    `Captured: ${g.captured.white}`;
  document.getElementById('white-captures').textContent =
    `Captured: ${g.captured.black}`;

  // Active player highlight
  document.getElementById('black-info').classList.toggle('active', g.current === 'black' && !g.gameOver);
  document.getElementById('white-info').classList.toggle('active', g.current === 'white' && !g.gameOver);

  // Score panel
  const sp = document.getElementById('score-panel');
  if (g.gameOver && g.scores) {
    sp.style.display = 'block';
    const bs = g.scores.black;
    const ws = g.scores.white;
    document.getElementById('score-table').innerHTML = `
      <tr><td></td><td>Black</td><td>White</td></tr>
      <tr><td>Territory</td><td>${bs.territory}</td><td>${ws.territory}</td></tr>
      <tr><td>Captures</td><td>${bs.captures}</td><td>${ws.captures}</td></tr>
      <tr><td style="border-top:1px solid #4a4060;padding-top:6px">Total</td>
          <td style="border-top:1px solid #4a4060;padding-top:6px">${bs.total}</td>
          <td style="border-top:1px solid #4a4060;padding-top:6px">${ws.total}</td></tr>
    `;
    let winnerText;
    if (bs.total > ws.total) {
      winnerText = `Black wins by ${bs.total - ws.total} point${bs.total - ws.total !== 1 ? 's' : ''}!`;
    } else if (ws.total > bs.total) {
      winnerText = `White wins by ${ws.total - bs.total} point${ws.total - bs.total !== 1 ? 's' : ''}!`;
    } else {
      winnerText = 'Tie game!';
    }
    document.getElementById('winner-text').textContent = winnerText;
  } else {
    sp.style.display = 'none';
  }

  document.getElementById('pass-btn').disabled = g.gameOver;
}

function startGame(boardSize) {
  game = new Game(boardSize);
  renderer = new Renderer(canvas, game);
  renderer.draw();
  updateUI();
}

// ─── Pointer events: unified mouse / touch / pen drag-to-pan + tap-to-place ──

const DRAG_THRESHOLD = 6; // pixels before a press becomes a pan
let isPanning = false;
let pointerDownX = 0, pointerDownY = 0;
let panOriginX = 0, panOriginY = 0;

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  isPanning = false;
  pointerDownX = e.clientX;
  pointerDownY = e.clientY;
  panOriginX = renderer.panX;
  panOriginY = renderer.panY;
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', (e) => {
  if (e.buttons & 1) {
    // Drag-to-pan
    const dx = e.clientX - pointerDownX;
    const dy = e.clientY - pointerDownY;
    if (!isPanning && (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD)) {
      isPanning = true;
      canvas.classList.add('panning');
      canvas.classList.remove('placing');
    }
    if (isPanning) {
      renderer.hoverPos = null;
      renderer.panX = panOriginX + dx;
      renderer.panY = panOriginY + dy;
      renderer.draw();
    }
  } else {
    // Hover — update ghost stone
    const rect = canvas.getBoundingClientRect();
    renderer.hoverPos = renderer.fromCanvas(e.clientX - rect.left, e.clientY - rect.top);
    renderer.draw();
  }
});

canvas.addEventListener('pointerleave', () => {
  renderer.hoverPos = null;
  renderer.draw();
});

canvas.addEventListener('pointerup', (e) => {
  canvas.classList.remove('panning', 'placing');
  if (!isPanning) {
    // Short tap / click → place stone
    const rect = canvas.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;
    const pos = renderer.fromCanvas(px, py);

    const legal = game.placeStone(pos.x, pos.y);
    renderer.draw();
    updateUI();

    if (!legal && game.illegalFlash) {
      setTimeout(() => { game.illegalFlash = null; renderer.draw(); }, 400);
    }
  }
  isPanning = false;
});

document.getElementById('pass-btn').addEventListener('click', () => {
  game.pass();
  renderer.draw();
  updateUI();
});

document.getElementById('new-game-btn').addEventListener('click', () => {
  const size = parseInt(document.getElementById('size-select').value, 10);
  startGame(size);
});

document.getElementById('size-select').addEventListener('change', () => {
  const size = parseInt(document.getElementById('size-select').value, 10);
  startGame(size);
});

window.addEventListener('resize', () => {
  renderer.resize();
  renderer.draw();
});

// Boot
startGame(9);
</script>

<script>
  const d = new Date(document.lastModified);
  document.getElementById('last-modified').textContent =
    d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
</script>
