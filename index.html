<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torogo — Toroidal Go</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #e0d8c8;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  h1 {
    font-size: 1.8rem;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
    color: #f0e6c8;
  }

  .subtitle {
    font-size: 0.78rem;
    color: #a09888;
    letter-spacing: 0.18em;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  #board-canvas {
    display: block;
    cursor: grab;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    touch-action: none;
  }

  #board-canvas.placing {
    cursor: crosshair;
  }

  #board-canvas.panning {
    cursor: grabbing;
  }

  .info-panel {
    display: flex;
    gap: 24px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .player-info {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 8px;
    background: #12122a;
    border: 2px solid transparent;
    transition: border-color 0.2s;
    min-width: 130px;
    justify-content: center;
  }

  .player-info.active {
    border-color: #c8a84a;
  }

  .stone-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .stone-dot.black {
    background: radial-gradient(circle at 35% 35%, #555, #111);
    box-shadow: 1px 1px 3px rgba(0,0,0,0.8);
  }

  .stone-dot.white {
    background: radial-gradient(circle at 35% 35%, #fff, #ccc);
    box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  }

  .player-label {
    font-size: 0.85rem;
    color: #c8c0b0;
  }

  .capture-count {
    font-size: 0.78rem;
    color: #a09080;
  }

  #status-msg {
    margin-top: 10px;
    font-size: 0.88rem;
    color: #c8a84a;
    letter-spacing: 0.05em;
    min-height: 1.2em;
    text-align: center;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    padding: 8px 20px;
    border-radius: 6px;
    border: 1px solid #4a4060;
    background: #2a2a4a;
    color: #e0d8c8;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s, border-color 0.15s;
  }

  button:hover {
    background: #3a3a5a;
    border-color: #6a60a0;
  }

  button:active {
    background: #1e1e3a;
  }

  button#pass-btn {
    background: #2a3a2a;
    border-color: #4a604a;
  }

  button#pass-btn:hover {
    background: #3a4a3a;
    border-color: #6a906a;
  }

  select {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #4a4060;
    background: #2a2a4a;
    color: #e0d8c8;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
  }

  #score-panel {
    display: none;
    margin-top: 14px;
    padding: 14px 24px;
    background: #12122a;
    border-radius: 10px;
    border: 1px solid #4a4060;
    text-align: center;
    min-width: 240px;
  }

  #score-panel h2 {
    font-size: 1.1rem;
    color: #c8a84a;
    margin-bottom: 8px;
  }

  #score-panel table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  #score-panel td {
    padding: 3px 10px;
    color: #c0b8a8;
  }

  #score-panel td:first-child {
    text-align: left;
    color: #a09888;
  }

  #score-panel td:last-child {
    text-align: right;
    font-weight: bold;
  }

  #winner-text {
    margin-top: 10px;
    font-size: 1.1rem;
    color: #f0e060;
    font-weight: bold;
  }

  .top-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<div class="top-bar">
  <div></div>
  <div>
    <h1 style="text-align:center;">Torogo</h1>
    <p class="subtitle" style="text-align:center;">Toroidal Go &mdash; Drag the board to pan left/right/up/down.</p>
  </div>
  <button id="new-game-btn">New Game</button>
</div>

<canvas id="board-canvas"></canvas>

<div class="info-panel">
  <div class="player-info" id="black-info">
    <div class="stone-dot black"></div>
    <div>
      <div class="player-label">Black</div>
      <div class="capture-count" id="black-captures">Captured: 0</div>
    </div>
  </div>
  <div class="player-info" id="white-info">
    <div class="stone-dot white"></div>
    <div>
      <div class="player-label">White</div>
      <div class="capture-count" id="white-captures">Captured: 0</div>
    </div>
  </div>
</div>

<div id="status-msg">Black to play</div>

<div class="controls">
  <button id="pass-btn">Pass</button>
  <label for="overlap-select">View overlap</label>
  <select id="overlap-select">
    <option value="0">0</option>
    <option value="1" selected>1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select>
</div>

<div id="score-panel">
  <h2>Final Score</h2>
  <table id="score-table"></table>
  <div id="winner-text"></div>
</div>

<script src="game.js"></script>
<script src="ui.js"></script>

<p style="margin-top:20px;font-size:0.9rem;color:#c8c0b0;letter-spacing:0.04em;">Last modified: <span id="last-modified"></span></p>

<script>
  (async () => {
    const files = ['index.html', 'game.js', 'ui.js'];
    let latest = null;
    try {
      const results = await Promise.all(
        files.map(f => fetch(f, { method: 'HEAD' }).catch(() => null))
      );
      for (const res of results) {
        if (!res || !res.ok) continue;
        const lm = res.headers.get('Last-Modified');
        if (!lm) continue;
        const d = new Date(lm);
        if (!latest || d > latest) latest = d;
      }
    } catch (_) {}

    const stamp = latest ?? new Date(document.lastModified);
    document.getElementById('last-modified').textContent =
      stamp.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
  })();
</script>
</body>
</html>
