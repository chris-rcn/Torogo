<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torogo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #e0d8c8;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  h1 {
    font-size: 1.8rem;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
    color: #f0e6c8;
  }

  .subtitle {
    font-size: 0.78rem;
    color: #a09888;
    letter-spacing: 0.18em;
    margin-bottom: 14px;
    text-transform: none;
  }

  #board-canvas {
    display: block;
    cursor: grab;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    touch-action: none;
  }

  #board-canvas.placing {
    cursor: crosshair;
  }

  #board-canvas.panning {
    cursor: grabbing;
  }

  #board-canvas.shielded {
    pointer-events: none;
    cursor: default;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    padding: 8px 20px;
    border-radius: 6px;
    border: 1px solid #4a4060;
    background: #2a2a4a;
    color: #e0d8c8;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s, border-color 0.15s;
  }

  button:hover {
    background: #3a3a5a;
    border-color: #6a60a0;
  }

  button:active {
    background: #1e1e3a;
  }

  #pass-btn { margin-left: auto; }

  button#pass-btn {
    background: #2a3a2a;
    border-color: #4a604a;
  }

  button#pass-btn:hover {
    background: #3a4a3a;
    border-color: #6a906a;
  }

  select {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #4a4060;
    background: #2a2a4a;
    color: #e0d8c8;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
  }


  #board-container {
    display: inline-flex;
    flex-direction: column;
  }

  #score-bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 6px;
    padding: 6px 12px;
    font-size: 1rem;
    font-weight: bold;
    color: #c0b8a8;
    letter-spacing: 0.04em;
    background: #12122a;
    border: 1px solid #3a3460;
    border-radius: 6px;
  }

  #score-bar .black-score { color: #e0d8c8; }
  #score-bar .white-score { color: #e0d8c8; }

  #board-wrapper {
    position: relative;
    display: inline-block;
  }

  #board-controls {
    display: flex;
    align-items: center;
    margin-top: 8px;
    min-height: 2.2em;
  }

  #board-controls .ctrl-left,
  #board-controls .ctrl-mid,
  #board-controls .ctrl-right {
    flex: 1;
    display: flex;
    align-items: center;
  }

  #board-controls .ctrl-left  { justify-content: flex-start; }
  #board-controls .ctrl-mid   { justify-content: center; }
  #board-controls .ctrl-right { justify-content: flex-end; gap: 10px; }

  #black-msg {
    font-size: 0.9rem;
    color: #a09888;
    letter-spacing: 0.04em;
  }

  #black-msg.thinking {
    color: #c8a84a;
    font-weight: bold;
  }

  #black-msg.thinking::after {
    content: '';
    display: inline-block;
    width: 0.65em;
    height: 0.65em;
    margin-left: 0.45em;
    border: 2px solid #c8a84a;
    border-top-color: transparent;
    border-radius: 50%;
    vertical-align: middle;
    animation: spin 0.8s linear infinite;
  }

  #game-msg {
    font-size: 1rem;
    font-weight: bold;
    color: #f0e060;
    letter-spacing: 0.05em;
    text-align: center;
  }

  #white-msg {
    font-size: 0.9rem;
    font-weight: bold;
    color: #c8a84a;
    letter-spacing: 0.05em;
  }

  .top-bar {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    align-items: center;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<div class="top-bar">
  <div>
    <h1 style="text-align:center;">Toroidal Go</h1>
    <p class="subtitle" style="text-align:center;">Drag the board to pan.</p>
  </div>
  <button id="new-game-btn">New Game</button>
</div>

<div id="board-container">
  <div id="board-wrapper">
    <canvas id="board-canvas"></canvas>
  </div>
  <div id="score-bar">
    <span class="black-score" id="black-score-display">Black: —</span>
    <span class="white-score" id="white-score-display">White: —</span>
  </div>
  <div id="board-controls">
    <div class="ctrl-left"><span id="black-msg"></span></div>
    <div class="ctrl-mid"><span id="game-msg"></span></div>
    <div class="ctrl-right"><span id="white-msg"></span><button id="pass-btn" style="display:none">Pass</button></div>
  </div>
</div>


<!--These should all be listed in 'sourceFiles' below.-->
<script src="util.js"></script>
<script src="game2.js"></script>
<script src="ladder2.js"></script>
<script src="patterns2.js"></script>
<script src="patterns-data.js"></script>
<script src="ai/production.js"></script>
<script src="ui.js"></script>

<p style="margin-top:36px;font-size:0.9rem;color:#c8c0b0;letter-spacing:0.04em;"><span id="last-modified"></span></p>

<script>
  (async () => {
    const sourceFiles = ['index.html', 'util.js', 'game.js', 'ladder2.js', 'patterns2.js', 'patterns-data.js', 'ai/production.js', 'ui.js'];
    let latest = null;
    try {
      const results = await Promise.all(
        sourceFiles.map(f => fetch(f, { method: 'HEAD' }).catch(() => null))
      );
      for (const res of results) {
        if (!res || !res.ok) continue;
        const lm = res.headers.get('Last-Modified');
        if (!lm) continue;
        const d = new Date(lm);
        if (!latest || d > latest) latest = d;
      }
    } catch (_) {}

    const stamp = new Date(document.lastModified);
    document.getElementById('last-modified').textContent =
      stamp.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
  })();
</script>
</body>
</html>
